{% extends 'shop/base.html' %}
{% block content %}
<div class="card" style="margin: 4rem auto; max-width: 400px; text-align: center;">
    <h2>Login</h2>
    <form method="post" action="{% url 'shop:login' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Login</button>
    </form>
    <p style="margin-top: 1rem;"><a href="{% url 'shop:register' %}">Create an account</a></p>
</div>
{% endblock %}
