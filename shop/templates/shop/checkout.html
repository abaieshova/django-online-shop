{% extends 'shop/base.html' %}
{% block content %}
<h1>Checkout Confirmation</h1>
<div class="card">
    <p>You are about to place an order for {{ cart|length }} items.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Confirm Order</button>
    </form>
</div>
{% endblock %}
